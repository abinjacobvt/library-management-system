<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>My Requests</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-4">

    <h3>My Borrow Requests</h3>

    <table class="table table-bordered mt-3">
        <thead>
        <tr>
            <th>Book</th>
            <th>Status</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="r : ${requests}">
            <td th:text="${r.bookTitle}"></td>

            <td>
                <span th:if="${r.status == null}" class="badge bg-warning">Pending</span>
                <span th:if="${r.status == 'APPROVED'}" class="badge bg-success">Approved</span>
                <span th:if="${r.status == 'REJECTED'}" class="badge bg-danger">Rejected</span>
            </td>
        </tr>
        </tbody>
    </table>

    <a href="/books" class="btn btn-secondary">Back</a>

</div>

</body>
</html>
