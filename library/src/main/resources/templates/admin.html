<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin Requests</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-4">

    <h2>Borrow Requests</h2>

    <table class="table table-bordered">
        <thead>
        <tr>
            <th>Book</th>
            <th>Status</th>
            <th>Actions</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="r : ${requests}">
            <td th:text="${r.bookTitle}"></td>
            <td th:text="${r.status}"></td>
            <td>

                <form th:action="@{/admin/approve/{id}(id=${r.id})}" method="post" class="d-inline">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button class="btn btn-success btn-sm">Approve</button>
                </form>

                <form th:action="@{/admin/reject/{id}(id=${r.id})}" method="post" class="d-inline">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button class="btn btn-danger btn-sm">Reject</button>
                </form>

            </td>
        </tr>
        </tbody>
    </table>

    <a href="/books" class="btn btn-secondary">Back</a>

</div>

</body>
</html>
